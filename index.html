<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sculpted-veil-flip-card</title>
  <meta name="description" content="Sculpted Veil digital flip card for Maya Lee" />
  <style>
    :root {
      --ink: #171717;
      --muted: #5f5b62;
      --bg-a: #fff6fa;
      --bg-b: #eef7f4;
      --bg-c: #f8faee;
      --shadow: 0 24px 60px rgba(10,10,10,.16);
      --radius: 28px;
      --speed: 820ms;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(247, 179, 209, .34), transparent 25%),
        radial-gradient(circle at top right, rgba(195, 236, 194, .30), transparent 26%),
        radial-gradient(circle at bottom left, rgba(204, 230, 244, .32), transparent 24%),
        linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
    }
    .shell {
      width: min(100%, 460px);
      display: grid;
      gap: 16px;
      justify-items: center;
    }
    .note {
      margin: 0;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
      max-width: 32ch;
    }
    .scene { width: 100%; perspective: 1600px; }
    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      transform-style: preserve-3d;
      transition: transform var(--speed) cubic-bezier(.22,.8,.2,1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: white;
    }
    .card.is-flipped { transform: rotateY(180deg); }
    .face {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: var(--radius);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: white;
      display: grid;
      place-items: center;
      padding: 8px;
    }
    .back { transform: rotateY(180deg); }
    .face img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: white;
      border-radius: 20px;
    }
    .tap-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
      border: 0;
      background: transparent;
      border-radius: inherit;
      cursor: pointer;
    }
    .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    button.action {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .dark-btn { background: #181818; color: #fff; }
    .light-btn { background: rgba(255,255,255,.82); color: #181818; box-shadow: 0 10px 24px rgba(10,10,10,.08); }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    @media (max-width: 480px) { body { padding: 16px; } }
    @media (prefers-reduced-motion: reduce) { .card { transition-duration: .01ms; } }
  </style>
</head>

  <script>
    const card = document.getElementById('card');
    const tapLayer = document.getElementById('tapLayer');
    const flipBtn = document.getElementById('flipBtn');
    const autoBtn = document.getElementById('autoBtn');
    const front = document.querySelector('.front');
    const back = document.querySelector('.back');
    let timer = null;
    let autoMode = false;
    function syncState() {
      const flipped = card.classList.contains('is-flipped');
      tapLayer.setAttribute('aria-pressed', String(flipped));
      front.setAttribute('aria-hidden', String(flipped));
      back.setAttribute('aria-hidden', String(!flipped));
    }
    function flipCard() { card.classList.toggle('is-flipped'); syncState(); }
    function stopAuto() { autoMode = false; autoBtn.textContent = 'Auto-flip: Off'; if (timer) clearInterval(timer); timer = null; }
    function startAuto() { stopAuto(); autoMode = true; autoBtn.textContent = 'Auto-flip: On'; timer = setInterval(flipCard, 2500); }
    tapLayer.addEventListener('click', flipCard);
    flipBtn.addEventListener('click', flipCard);
    autoBtn.addEventListener('click', () => autoMode ? stopAuto() : startAuto());
    syncState();
  </script>
</body>
</html>
