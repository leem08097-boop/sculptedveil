<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sculpted Veil • Maya Lee</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* INTRO SCREEN */
#intro-screen {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  transition: opacity 1s ease;
}

#intro-screen.hide {
  opacity: 0;
  pointer-events: none;
}

#intro-gif {
  max-width: 100%;
  max-height: 100vh;
  object-fit: contain;
}

/* CARD SCREEN */
#card-screen {
  opacity: 0;
  transition: opacity 1s ease;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8f5e9);
  padding: 16px;
}

#card-screen.show {
  opacity: 1;
}

.scene {
  width: 100%;
  max-width: 600px;
  perspective: 1200px;
}

.card {
  width: 100%;
  aspect-ratio: 380 / 260;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  border-radius: 28px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
}

.card.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 28px;
  overflow: hidden;
}

.card-face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 28px;
}

.card-back {
  transform: rotateY(180deg);
}

.tap-hint {
  text-align: center;
  margin-top: 16px;
  font-family: sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: #f9a8d4;
  opacity: 0.8;
  text-transform: uppercase;
}
</style>
</head>
<body>

<!-- INTRO SCREEN -->
<div id="intro-screen">
  <img id="intro-gif" src="intro.gif" alt="Sculpted Veil Intro">
</div>

<!-- CARD SCREEN -->
<div id="card-screen">
  <div>
    <div class="scene">
      <div class="card" id="business-card"
           onclick="this.classList.toggle('flipped')"
           tabindex="0" role="button"
           aria-label="Digital business card - tap to flip">
        <div class="card-face card-front">
          <img src="1.jpg" alt="Sculpted Veil Front">
        </div>
        <div class="card-face card-back">
          <img src="2.jpg" alt="Sculpted Veil Back">
        </div>
      </div>
    </div>
    <p class="tap-hint">✨ tap card to flip ✨</p>
  </div>
</div>

<script>
  const gif = document.getElementById('intro-gif');
  const introScreen = document.getElementById('intro-screen');
  const cardScreen = document.getElementById('card-screen');

  // Wait for GIF to load then time the transition
  gif.onload = function() {
    // Most intro GIFs are 2-5 seconds — adjust this number to match yours
    setTimeout(function() {
      introScreen.classList.add('hide');
      cardScreen.classList.add('show');
    }, 3000); // 3000 = 3 seconds, change if your GIF is longer
  };

  // Fallback in case onload already fired
  if (gif.complete) {
    setTimeout(function() {
      introScreen.classList.add('hide');
      cardScreen.classList.add('show');
    }, 3000);
  }

  // Keyboard support
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      const card = document.getElementById('business-card');
      card.classList.toggle('flipped');
    }
  });
</script>
</body>
</html>
