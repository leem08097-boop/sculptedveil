<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sculpted Veil • Maya Lee</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  background: #000;
  width: 100%;
}

/* INTRO SECTION */
#intro-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #000;
  position: relative;
}

#intro-gif {
  width: 100%;
  height: auto;
  display: block;
}
/* Scroll down hint */
.scroll-hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  color: #f9a8d4;
  font-family: sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.8;
  animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* CARD SECTION */
#card-section {
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8f5e9);
  padding: 32px 16px;
}

.scene {
  width: 85vw;
  max-width: 860px;
  min-width: 280px;
  perspective: 1200px;
}

.card {
  width: 100%;
  aspect-ratio: 380 / 260;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  border-radius: 20px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.3);
}

.card.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 20px;
  overflow: hidden;
}

.card-face img {
  width: 100%;
  height: 100%;
  object-fit: fill;
  display: block;
}

.card-back {
  transform: rotateY(180deg);
}

.tap-hint {
  text-align: center;
  margin-top: 20px;
  font-family: sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: #be185d;
  opacity: 0.8;
  text-transform: uppercase;
}
</style>
</head>
<body>

<!-- INTRO SECTION -->
<section id="intro-section">
  <img id="intro-gif" src="intro.gif" alt="Sculpted Veil Intro">
  <p class="scroll-hint">✨ scroll down ✨</p>
</section>

<!-- CARD SECTION -->
<section id="card-section">
  <div class="scene">
    <div class="card" id="business-card"
         onclick="this.classList.toggle('flipped')"
         tabindex="0" role="button"
         aria-label="Digital business card - tap to flip">
      <div class="card-face card-front">
        <img src="1.jpg" alt="Sculpted Veil Front">
      </div>
      <div class="card-face card-back">
        <img src="2.jpg" alt="Sculpted Veil Back">
      </div>
    </div>
  </div>
  <p class="tap-hint">✨ tap card to flip ✨</p>
</section>

<script>
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      const card = document.getElementById('business-card');
      card.classList.toggle('flipped');
    }
  });
</script>
</body>
</html>
